services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: requirements-db
    environment:
      POSTGRES_DB: requirements_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: requirements-app
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      SERVER_PORT: 8080
      SERVER_ADDRESS: 0.0.0.0
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/requirements_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PGVECTOR_HOST: postgres
      PGVECTOR_PORT: 5432
      PGVECTOR_DATABASE: requirements_db
      PGVECTOR_USER: postgres
      PGVECTOR_PASSWORD: postgres
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID}
      AUTH_ADMIN_EMAILS: ${AUTH_ADMIN_EMAILS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command:
      - "http"
      - "app:8080"
      - "--pooling-enabled"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - app

volumes:
  postgres_data:

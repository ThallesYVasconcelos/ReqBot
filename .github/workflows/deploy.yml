name: Deploy to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: requirements-assistant
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker push
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/images/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          IMAGE=$(echo -n "$IMAGE" | tr -d '\n\r')
          docker build . -f docker/Dockerfile -t "$IMAGE"
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/images/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          timeout: 300
          flags: --cpu-boost
          env_vars: |
            PORT=8080
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            AUTH_GOOGLE_CLIENT_ID=${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
            AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}
            AUTH_ADMIN_EMAILS=${{ secrets.AUTH_ADMIN_EMAILS }}
            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            PGVECTOR_HOST=${{ secrets.PGVECTOR_HOST }}
            PGVECTOR_PORT=${{ secrets.PGVECTOR_PORT }}
            PGVECTOR_DATABASE=${{ secrets.PGVECTOR_DATABASE }}
            PGVECTOR_USER=${{ secrets.PGVECTOR_USER }}
            PGVECTOR_PASSWORD=${{ secrets.PGVECTOR_PASSWORD }}

      - name: Show deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
